<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title">奇门遁甲排盘系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
            /* 🌿 新增主色调变量：茉莉绿色系 */
        :root {
            --moli-green: #d8eacc;
            --moli-green-dark: #b5d1a8;
            --accent-color: #6c9c74;
        }

        body {
            background-color: var(--moli-green);
            font-family: "Noto Serif SC", "Microsoft YaHei", serif;
            color: #2f4f2f;
        }

        .btn-primary {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .btn-primary:hover {
            background-color: var(--moli-green-dark);
            border-color: var(--moli-green-dark);
        }

        .result-container {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .tab-content {
            padding: 20px;
            border: 1px solid #dee2e6;
            border-top: none;
            border-radius: 0 0 5px 5px;
        }
        .interpretation-content {
            font-family: "Microsoft YaHei", sans-serif;
        }
        .ai-interpretation {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 16px;
        }
        .palace-data {
            font-family: "Microsoft YaHei", monospace;
            white-space: pre;
            overflow-x: auto;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
        }
        .card {
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            padding: 10px 15px;
        }
        .card-body {
            padding: 15px;
        }
        .question-highlight {
            background-color: #fff3cd;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #ffc107;
        }
        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
    </style>

            </div>
            
            <div class="row mt-3">

                    <div class="form-text" id="methodHint"></div>  <!-- ✨ 新加的小提示 -->
                </div>
                <div class="col-md-6">

                    <select class="form-select" name="type">
                        <option value="shijia" data-i18n="type_shijia" {% if data.type == 'shijia' %}selected{% endif %}>时家</option>
                        <option value="kejia" data-i18n="type_kejia" {% if data.type == 'kejia' %}selected{% endif %}>刻家</option>
                    </select>
                    <div class="form-text" id="typeHint"></div>  <!-- ✨ 新加的小提示 -->
                </div>
            </div>
            
            <div class="row mt-3">
                <div class="col-12">
                    <label class="form-label" data-i18n="question_label">您的问题</label>
                    <textarea class="form-control" name="question" rows="3" data-i18n="question_placeholder" placeholder="请输入您想要咨询的问题..."></textarea>
                </div>
            </div>

                <div class="col-12">

                </div>

            <ul class="nav nav-tabs" id="resultTabs">

            </div>

        // 语言切换功能
        function updateLanguage(lang) {
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
                        element.placeholder = i18n[lang][key];
                    } else {
                        element.textContent = i18n[lang][key];
                    }
                }
            });
            const methodHint = document.getElementById('methodHint');
            const typeHint = document.getElementById('typeHint');
            if (methodHint) methodHint.textContent = i18n[lang]['hint_method'] || '';
            if (typeHint) typeHint.textContent = i18n[lang]['hint_type'] || '';
        }

        // 监听语言选择器变化
        document.getElementById('languageSelect').addEventListener('change', function() {
            updateLanguage(this.value);
        });

        // 页面加载时初始化语言
        document.addEventListener('DOMContentLoaded', function() {
            updateLanguage('zh-CN');
            document.getElementById('langInput').value = 'zh-CN'; // 设置默认语言
        });

        document.getElementById('languageSelect').addEventListener('change', function() {
          const selectedLang = this.value;
          updateLanguage(selectedLang);
          document.getElementById('langInput').value = selectedLang; // 同步语言到隐藏字段
        });

        // 原有的表单提交代码
        document.getElementById('qimenForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const submitButton = this.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.innerHTML = '计算中...';
            
            try {
                const response = await fetch('https://qimenaskios.onrender.com/calculate', {
                                        method: 'POST',
                                        body: formData,
                                        });
                
                const result = await response.json();
                console.log("👉 后端返回的数据结果是：", result);
                
                // 显示用户问题
                const questionDisplay = document.getElementById('questionDisplay');
                const userQuestion = formData.get('question');
                if (userQuestion) {
                    questionDisplay.style.display = 'block';
                    questionDisplay.innerHTML = `<strong>您的问题：</strong>${userQuestion}`;
                } else {
                    questionDisplay.style.display = 'none';
                }
                
                // 显示AI解读结果
                document.getElementById('aiInterpretation').innerHTML = result.interpretation;
             
 
                // 显示 basic_info
                const basicInfo = result.basic_info;
                let basicInfoHtml = '';

                if (basicInfo && typeof basicInfo === 'object') {
                for (const key in basicInfo) {
                    const value = basicInfo[key];
                    if (value && typeof value === 'object') {
                    basicInfoHtml += `<strong>${key}：</strong><br>`;
                    for (const subKey in value) {
                        basicInfoHtml += `&nbsp;&nbsp;&nbsp;&nbsp;${subKey}：${value[subKey]}<br>`;
                    }
                    } else {
                    basicInfoHtml += `<strong>${key}：</strong>${value ?? '—'}<br>`;
                    }
                }
                } else {
                basicInfoHtml = '<em>无可用基本信息</em>';
                }

                document.getElementById('basicInfoContent').innerHTML = basicInfoHtml;
                
                // 显示排盘图
                const palaceData = result.palace_data;
                if (!palaceData) {
                  console.error("❌ 没有 palace_data 数据");
                } else {
                  console.log("✅ palace_data 已获取：", palaceData);
                  for (const gong in palaceData) {
                    const el = document.getElementById(`gong-${gong}`);
                    const data = palaceData[gong];
                    if (!el || !data) continue;
                    el.innerHTML = ["神", "門", "星", "天盤", "地盤"]
                      .map(key => data[key] ? `${key}：${data[key]}` : '')
                      .filter(Boolean)
                      .join("<br>");
                   }
                 }
                // 显示原始数据
                document.getElementById('resultContainer').style.display = 'block';
                
                // 滚动到结果区域
                document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert('计算出错：' + error.message);
            } finally {
                submitButton.disabled = false;
                submitButton.innerHTML = '排盘及解读';
            }
        });
