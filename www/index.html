        .progress-step::before {
            content: '';
            position: absolute;
            top: -19px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 50%;
            z-index: 1;
            transition: background 0.3s, border-color 0.3s;
        }
        .progress-step.active::before {
            background: #fff;
            border-color: #222;
        }
        .progress-step.completed::before {
            background: #222;
        }
        .progress-step::after {
            content: '';
            position: absolute;
            top: -19px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #f0f0f0;
            z-index: -1;
            transition: background 0.3s;
        }
        .progress-step:last-child::after {
            display: none;
        }
        .progress-step.completed::after {
            background: #222;
        }
